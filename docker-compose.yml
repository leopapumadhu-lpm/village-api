version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - village-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=village
      - POSTGRES_PASSWORD=village
      - POSTGRES_DB=villagedb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - village-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - village-network

volumes:
  postgres-data:
  redis-data:

networks:
  village-network:
    driver: bridge
